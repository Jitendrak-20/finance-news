name: pulseiq-cron

on:
  schedule:
    - cron: "*/01 * * * *"
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deployed pipeline
        env:
          BASE_URL: ${{ secrets.PULSEIQ_BASE_URL }}
          CRON_SECRET: ${{ secrets.PULSEIQ_CRON_SECRET }}
        run: |
          if [ -z "$BASE_URL" ]; then
            echo "Missing GitHub secret: PULSEIQ_BASE_URL"
            exit 1
          fi
          if [ -z "$CRON_SECRET" ]; then
            echo "Missing GitHub secret: PULSEIQ_CRON_SECRET"
            exit 1
          fi
          curl -fsSL \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$BASE_URL/api/cron"
