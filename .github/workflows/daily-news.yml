name: daily-news

on:
  schedule:
    - cron: "0 2,6,10,14 * * *"
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - name: Start API server
        run: node server.js &

      - name: Wait for health
        run: |
          for i in {1..20}; do
            if curl -fsS http://127.0.0.1:3000/api/health; then
              exit 0
            fi
            sleep 2
          done
          exit 1

      - name: Run fetch job
        run: curl -fsS -X POST http://127.0.0.1:3000/api/jobs/fetch

      - name: Run generate job
        run: curl -fsS -X POST http://127.0.0.1:3000/api/jobs/generate
